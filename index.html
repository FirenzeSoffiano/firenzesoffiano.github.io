<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Accesso Protetto</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
    }

    .login-box, .email-box {
      background: #1e293b;
      padding: 40px;
      border-radius: 10px;
      text-align: center;
      width: 350px; /* Leggermente più largo */
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }

    h2, h1 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 5px;
      margin-bottom: 15px;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      background: #38bdf8;
      cursor: pointer;
      border-radius: 5px;
      font-weight: bold;
    }

    button:hover {
      background: #0ea5e9;
    }

    .error {
      color: #f87171;
      margin-top: 10px;
      display: none;
    }

    /* Stile per il riquadro email */
    .email-display {
      background: #0f172a;
      padding: 15px;
      border-radius: 8px;
      border: 1px dashed #38bdf8;
      margin-top: 20px;
      font-weight: bold;
      color: #38bdf8;
    }

    /* Pagina nascosta all'inizio */
    .content {
      display: none;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="login-box" id="loginBox">
  <h2>Inserisci Password</h2>
  <input type="password" id="password" placeholder="Password">
  <button onclick="checkPassword()">Accedi</button>
  <p class="error" id="error">Password errata ❌</p>
</div>

<div class="content" id="content">
  <div class="email-box">
    <h1>Benvenuto 🎉</h1>
    <p>Accesso riuscito. Ecco i dati richiesti:</p>
    
    <div class="email-display">
       📧 tua-email@esempio.it
    </div>
  </div>
</div>

<script>
  const PASSWORD = "1234"; 

  function checkPassword() {
    const input = document.getElementById("password").value;
    const error = document.getElementById("error");

    if (input === PASSWORD) {
      document.getElementById("loginBox").style.display = "none";
      document.getElementById("content").style.display = "block";
    } else {
      error.style.display = "block";
    }
  }

  document.getElementById("password").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
      checkPassword();
    }
  });
</script>

</body>
</html>
