<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firenze Soffiano</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { height: 100vh; display: flex; justify-content: center; align-items: center; background: #0f172a; color: white; overflow: hidden; }
    .card { background: #1e293b; padding: 30px; border-radius: 12px; text-align: center; width: 420px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid #334155; z-index: 10; }
    #stepExternal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; display: none; flex-direction: column; }
    iframe { width: 100%; height: calc(100% - 60px); border: none; background: white; }
    .top-bar { height: 60px; background: #1e293b; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 1px solid #334155; }
    h2 { margin-bottom: 20px; color: #38bdf8; }
    input { width: 100%; padding: 12px; border: 1px solid #334155; border-radius: 6px; background: #0f172a; color: white; margin-bottom: 15px; outline: none; display: block; }
    button { width: 100%; padding: 14px 20px; border: none; background: #38bdf8; color: #0f172a; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.3s; margin-bottom: 10px; display: flex; align-items: center; justify-content: flex-start; gap: 15px; font-size: 0.95rem; text-align: left; }
    button:hover { background: #7dd3fc; transform: translateX(5px); }
    .icon-container { width: 30px; display: flex; justify-content: center; align-items: center; flex-shrink: 0; }
    .btn-icon { max-height: 24px; width: auto; border-radius: 3px; object-fit: contain; }
    .btn-outline { background: transparent; color: #38bdf8; border: 1px solid #38bdf8; margin-top: 10px; justify-content: center; text-align: center; }
    .hidden { display: none !important; }
    #loader { color: #94a3b8; font-style: italic; margin-top: 10px; }
    .user-welcome { color: #4ade80; font-size: 1.2rem; margin-bottom: 5px; font-weight: bold; }
    .user-email { color: #94a3b8; font-size: 0.85rem; margin-bottom: 25px; font-style: italic; }
</style>
</head>
<body>

  <div class="card" id="mainCard">
    <div id="step1">
      <h2>Accesso Area Riservata</h2>
      <input type="text" id="userInput" placeholder="Cognome e Nome o e-mail">
      <button onclick="faseRicerca()" style="justify-content: center; text-align: center;">Continua</button>
    </div>

    <div id="step2" class="hidden">
      <h2 id="saluto"></h2>
      <input type="password" id="passInput" placeholder="Inserisci Password">
      <button onclick="faseLogin()" style="justify-content: center; text-align: center;">Accedi</button>
    </div>

    <div id="stepReset" class="hidden">
      <h2>Nuova Password</h2>
      <input type="password" id="newPass1" placeholder="Nuova Password">
      <input type="password" id="newPass2" placeholder="Conferma Password">
      <button onclick="salvaNuovaPassword()" style="justify-content: center; text-align: center;">Salva e Accedi</button>
    </div>

    <div id="step3" class="hidden">
      <div id="welcomeHeader" class="user-welcome"></div>
      <div id="emailHeader" class="user-email"></div>
      
      <button onclick="apriLink('INCARICHI')">
        <div class="icon-container">📄</div> 1) Visualizzare gli Incarichi
      </button>
      
      <button id="btnAppSheet" class="hidden" onclick="apriLink('APPSHEET')">
        <div class="icon-container"><img src="APPSHEET.jpg" class="btn-icon"></div> 
        AppSheet Incarichi
      </button>

      <button onclick="apriLink('TEPU_VIEW')">
        <div class="icon-container"><img src="TEPU.jpg" class="btn-icon"></div> 2) Visualizzare turni TePu
      </button>
      <button onclick="apriLink('TEPU_SITO')">
        <div class="icon-container"><img src="TEPU.jpg" class="btn-icon"></div> 3) Visualizza sito TePu
      </button>

      <button onclick="apriLink('TEPU_DISPO')">
        <div class="icon-container"><img src="CONFERMA.jpg" class="btn-icon"></div> 4) Inserisci disponibilità TePu
      </button>
      <button onclick="apriLink('TEPU_CONF')">
        <div class="icon-container"><img src="CONFERMA.jpg" class="btn-icon"></div> 5) Conferma il tuo turno TePu
      </button>

      <button onclick="location.reload()" class="btn-outline">Esci / Logout</button>
    </div>
    <div id="loader" class="hidden">Elaborazione...</div>
  </div>

  <div id="stepExternal">
    <div class="top-bar">
      <span id="titoloPagina" style="color: #38bdf8; font-weight: bold;"></span>
      <button onclick="tornaAlMenu()" style="width: auto; margin-bottom: 0; padding: 8px 15px; font-size: 0.8rem;">Torna al Menu</button>
    </div>
    <iframe id="externalFrame" src="" allowfullscreen sandbox="allow-storage-access-by-user-activation allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox allow-forms"></iframe>
  </div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbywz-3leU2cUE85szWxBVWkika3F3eKHhSJD2KzhpEby41a0cuEb-JWHzKAH_6Lflbz/exec";
  
  let utenteIdentificato = "";
  let nomeReale = "";
  let telefonoUtente = ""; 
  let linkAppSheetDinamico = "";

  async function faseRicerca() {
    const valore = document.getElementById("userInput").value.trim();
    if (!valore) return alert("Inserisci i dati richiesti");
    mostraLoader(true);
    try {
      const resp = await fetch(`${SCRIPT_URL}?azione=cerca&email=${encodeURIComponent(valore)}`);
      const data = await resp.json();
      if (data.trovato) {
        utenteIdentificato = valore;
        nomeReale = data.nome;
        telefonoUtente = data.telefono; 
        document.getElementById("saluto").innerText = "Ciao " + data.nome;
        cambiaStep("step1", "step2");
      } else { alert("Utente non trovato."); }
    } catch (e) { alert("Errore connessione."); }
    mostraLoader(false);
  }

  async function faseLogin() {
    const pass = document.getElementById("passInput").value.trim();
    mostraLoader(true);
    try {
      const resp = await fetch(`${SCRIPT_URL}?azione=login&telefono=${encodeURIComponent(telefonoUtente)}&password=${encodeURIComponent(pass)}`);
      const data = await resp.json();
      if (data.login) {
        linkAppSheetDinamico = data.linkAppSheet || "";
        if (data.reset) {
          cambiaStep("step2", "stepReset");
        } else {
          document.getElementById("welcomeHeader").innerText = "Ciao " + nomeReale;
          document.getElementById("emailHeader").innerText = utenteIdentificato;
          if (linkAppSheetDinamico && linkAppSheetDinamico.toLowerCase().startsWith("http")) {
            document.getElementById("btnAppSheet").classList.remove("hidden");
          }
          cambiaStep("step2", "step3");
        }
      } else { alert("Password errata!"); }
    } catch (e) { alert("Errore login."); }
    mostraLoader(false);
  }

  function apriLink(scelta) {
    let url = ""; let titolo = "";
    if (scelta === 'APPSHEET') { window.open(linkAppSheetDinamico, "_blank"); return; }
    else if (scelta === 'TEPU_SITO') { window.open("https://sites.google.com/view/tepu/home?authuser=0", "_blank"); return; }
    else if (scelta === 'INCARICHI') { url = "https://lookerstudio.google.com/embed/reporting/f152e697-95b9-440b-8f5e-773af928dd50/page/PEurF"; titolo = "Incarichi"; }
    else if (scelta === 'TEPU_VIEW') { url = "https://lookerstudio.google.com/embed/reporting/6b529a65-c908-42ef-b7ae-b47488150c39/page/exRtF"; titolo = "Turni TePu"; }
    else if (scelta === 'TEPU_DISPO') { url = "https://forms.gle/DkKF4wc4t5oQEGvh7"; titolo = "Disponibilità TePu"; }
    else if (scelta === 'TEPU_CONF') { url = "https://forms.gle/14andBiw6spC4AXJA"; titolo = "Conferma Turno"; }

    document.getElementById("mainCard").classList.add("hidden");
    document.getElementById("stepExternal").style.display = "flex";
    document.getElementById("externalFrame").src = url;
    document.getElementById("titoloPagina").innerText = titolo + " - " + nomeReale;
  }

  function tornaAlMenu() { document.getElementById("stepExternal").style.display = "none"; document.getElementById("mainCard").classList.remove("hidden"); document.getElementById("externalFrame").src = ""; }
  function cambiaStep(da, a) { document.getElementById(da).classList.add("hidden"); document.getElementById(a).classList.remove("hidden"); }
  function mostraLoader(stato) { document.getElementById("loader").classList.toggle("hidden", !stato); }
</script>
</body>
</html>
