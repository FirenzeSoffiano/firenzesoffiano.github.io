<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏡Firenze Soffiano</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
	body { 
		min-height: 100dvh; /* Usa l'altezza dinamica per escludere le barre del browser */
		display: flex; 
		justify-content: center; 
		align-items: center; 
		background: #0f172a; 
		color: white; 
		overflow-y: auto; /* Permette lo scroll se il contenuto eccede lo schermo */
		padding: 20px 0;
	}    
	.card { 
		background: #1e293b; 
		padding: 15px 30px 20px 30px; 
		border-radius: 12px; 
		text-align: center; 
		width: 90%; /* Più flessibile su mobile rispetto ai 420px fissi */
		max-width: 420px; 
		box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
		border: 1px solid #334155; 
		z-index: 10; 
		position: relative;
		margin: auto; /* Centra la card nello spazio rimanente */
	}    
	/* Assicurati che lo stepExternal occupi bene lo spazio */
	#stepExternal { 
		position: fixed; 
		top: 0; 
		left: 0; 
		width: 100%; 
		height: 100dvh; 
		background: #0f172a; 
		display: none; 
		flex-direction: column; 
		z-index: 999;
	}    
	iframe { width: 100%; height: calc(100% - 60px); border: none; background: white; }
    .top-bar { height: 60px; background: #1e293b; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 1px solid #334155; }
    h2 { margin-bottom: 2px; color: #38bdf8; font-size: 1.4rem; }
    .testata-seconda-riga { margin-bottom: 10px; color: #38bdf8; font-size: 1.0rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
    input { width: 100%; padding: 10px; border: 1px solid #334155; border-radius: 6px; background: #0f172a; color: white; margin-bottom: 10px; outline: none; display: block; }
    button { width: 100%; padding: 10px 15px; border: none; background: #38bdf8; color: #0f172a; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.3s; margin-bottom: 6px; display: flex; align-items: center; justify-content: flex-start; gap: 12px; font-size: 0.9rem; }
    button:hover { background: #7dd3fc; transform: translateX(3px); }
	.btn-outline { 
		background: transparent; 
		color: #38bdf8; 
		border: 1px solid #38bdf8; 
		margin-top: 15px; /* Aumentato il distacco dai tasti sopra */
		margin-bottom: 10px; /* Spazio di sicurezza dal bordo inferiore */
		justify-content: center; 
	}    
	.hidden { display: none !important; }
    .icon-container { width: 25px; height: 25px; display: flex; justify-content: center; align-items: center; flex-shrink: 0; }
    .btn-icon { max-width: 100%; max-height: 100%; border-radius: 3px; object-fit: contain; }
    .user-welcome { color: #4ade80; font-size: 1.1rem; font-weight: bold; }
    .version-label { position: absolute; bottom: 5px; right: 10px; font-size: 0.65rem; color: #475569; }

    /* DROPDOWN TERRITORI */
    .dropdown-container { position: relative; width: 100%; margin-bottom: 6px; }
    .dropdown-container::after { content: ""; position: absolute; bottom: 100%; left: 0; width: 100%; height: 20px; display: none; }
    .dropdown-container:hover::after { display: block; }
    .btn-territori { background: #38bdf8; color: #0f172a; margin-bottom: 0; width: 100%; }
    .dropdown-content { display: none; position: absolute; background-color: #1e293b; width: 100%; border-radius: 8px; border: 1px solid #334155; z-index: 100; bottom: calc(100% + 2px); box-shadow: 0 -10px 20px rgba(0,0,0,0.5); }
    .dropdown-container:hover .dropdown-content { display: block; }
    .dropdown-content button { background: transparent; color: white; border: none; border-radius: 0; border-bottom: 1px solid #334155; justify-content: center; margin-bottom: 0; }
    .dropdown-content button:last-child { border-bottom: none; }
    .dropdown-content button:hover { background-color: #38bdf8; color: #0f172a; transform: none; }
	
	.btn-territori-dynamic {
    background-color: #fef08a !important; /* Giallo tenue */
    color: #854d0e !important; /* Testo marrone scuro per contrasto */
    font-weight: bold;
}
</style>
</head>
<body>

  <div class="card" id="mainCard">
    <div id="step1">
      <h2>Accesso Area Riservata</h2>
      <div class="testata-seconda-riga">🏡Firenze Soffiano</div>
      <input type="text" id="userInput" placeholder="Cognome e Nome o e-mail" onkeypress="if(event.key==='Enter') faseRicerca()">
      <button type="button" onclick="faseRicerca()" style="justify-content: center;">Continua</button>
    </div>

    <div id="step2" class="hidden">
      <div class="testata-seconda-riga" style="margin-bottom: 5px;">🏡Firenze Soffiano</div>
      <h2 id="saluto"></h2>
	<div id="areaLogin">
		<input type="password" id="passInput" placeholder="Inserisci Password" onkeypress="if(event.key==='Enter') faseLogin()">
		<button type="button" onclick="faseLogin()" style="justify-content: center;">Accedi</button>
		<p onclick="faseResetRichiesta()" style="font-size: 0.75rem; color: #94a3b8; cursor: pointer; margin-top: 8px; text-decoration: underline; text-align: center; width: 100%;">Password dimenticata?</p>
	</div>      
	<div id="areaPrimoAccesso" class="hidden">
        <p style="font-size: 0.85rem; color: #f87171; margin-bottom: 10px; line-height: 1.2;">È il tuo primo accesso.<br>Crea una password personalizzata:</p>
        <input type="password" id="newPassInput" placeholder="Nuova Password">
        <input type="password" id="confirmPassInput" placeholder="Conferma Password">
        <button type="button" onclick="faseCambioPassword()" style="background: #4ade80; justify-content: center;">Salva Password</button>
      </div>
    </div>

    <div id="step3" class="hidden">
      <div class="testata-seconda-riga" style="margin-bottom: 5px;">🏡Firenze Soffiano</div>
      <div id="welcomeHeader" class="user-welcome"></div>
      <div id="idHeader" style="color: #94a3b8; font-size: 0.75rem; margin-bottom: 12px; font-style: italic;">Accesso verificato</div>
      
      <button onclick="apriLink('INCARICHI')"><div class="icon-container"><img src="APPSHEET.jpg" class="btn-icon"></div> Visualizza gli incarichi</button>
      <button id="btnAppSheet" class="hidden" onclick="apriLink('APPSHEET')"><div class="icon-container"><img src="APPSHEET.jpg" class="btn-icon"></div> AppSheet Incarichi</button>
      <button id="btnAppSheetTePu" class="hidden" onclick="apriLink('APPSHEET_TEPU')"><div class="icon-container"><img src="APPSHEET.jpg" class="btn-icon"></div> AppSheet TePu</button>
      
      <button id="btnTepuView" class="hidden" onclick="apriLink('TEPU_VIEW')"><div class="icon-container"><img src="TEPU.jpg" class="btn-icon"></div> Visualizza turni TePu</button>
      <button id="btnTepuSito" class="hidden" onclick="apriLink('TEPU_SITO')"><div class="icon-container"><img src="TEPU.jpg" class="btn-icon"></div> Sito TePu</button>
      <button id="btnTepuDispo" class="hidden" onclick="apriLink('TEPU_DISPO')"><div class="icon-container"><img src="CONFERMA.jpg" class="btn-icon"></div> Inserisci disponibilità TePu</button>
      <button id="btnTepuConf" class="hidden" onclick="apriLink('TEPU_CONF')"><div class="icon-container"><img src="CONFERMA.jpg" class="btn-icon"></div> Conferma turno TePu</button>
	  <button id="btnTepuRapp" class="hidden" onclick="apriLink('TEPU_RAPP')"><div class="icon-container"><img src="CONFERMA.jpg" class="btn-icon"></div> Rapporto del turno TePu</button>

      <div class="dropdown-container">
        <button class="btn-territori"><div class="icon-container">🌎</div> Territori</button>
        <div class="dropdown-content">	
			<button id="btnTerritoriApp" class="hidden btn-territori-dynamic" onclick="apriLink('TERRITORI_APP')">		<div class="icon-container"><img src="REPTERR.jpg" class="btn-icon"></div> App Territori
			</button>
          <button onclick="apriLink('TERRITORI_CONG')">Mappa Totale</button>
          <button onclick="apriLink('TERRITORI_LAV')">In Lavorazione</button>
          <button onclick="apriLink('TERRITORI_NON_LAV')">Non Lavorati</button>
        </div>
      </div>
      <button onclick="location.reload()" class="btn-outline">Logout/Uscita</button>
    </div>
    <div id="loader" class="hidden" style="color:#94a3b8; font-size:0.8rem; margin-top:10px;">Elaborazione in corso...</div>
    <div class="version-label">Versione 3.5.2</div>
  </div>

  <div id="stepExternal">
    <div class="top-bar">
      <span id="titoloPagina" style="color: #38bdf8; font-weight: bold;"></span>
      <button onclick="tornaAlMenu()" style="width: auto; padding: 5px 10px;">Chiudi</button>
    </div>
    <iframe id="externalFrame" src=""></iframe>
  </div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbywz-3leU2cUE85szWxBVWkika3F3eKHhSJD2KzhpEby41a0cuEb-JWHzKAH_6Lflbz/exec";
  let identificativoUtente = ""; 
  let linkAppSheetDinamico = ""; 
  let linkTePuDinamico = "";
  let linkTerritoriDinamico = ""; 

  async function faseRicerca() {
    const input = document.getElementById("userInput");
    const valore = input.value.trim();
    if (!valore) return alert("Inserisci Nome o Email");
    mostraLoader(true);
    try {
      const resp = await fetch(`${SCRIPT_URL}?azione=cerca&email=${encodeURIComponent(valore)}`);
      const data = await resp.json();
      if (data.trovato) {
        identificativoUtente = data.nome;
        document.getElementById("saluto").innerText = "Ciao " + data.nome;
        document.getElementById("step1").classList.add("hidden");
        document.getElementById("step2").classList.remove("hidden");
      } else {
        alert("Utente non trovato.");
      }
    } catch (e) { 
      console.error(e);
      alert("Errore di connessione al server."); 
    }
    mostraLoader(false);
  }

  async function faseLogin() {
    const pass = document.getElementById("passInput").value.trim();
    if (!pass) return alert("Inserisci la password");
    mostraLoader(true);
    try {
      const resp = await fetch(`${SCRIPT_URL}?azione=login&telefono=${encodeURIComponent(identificativoUtente)}&password=${encodeURIComponent(pass)}`);
      const data = await resp.json();
      if (data.login) {
        if (data.reset) { 
            document.getElementById("areaLogin").classList.add("hidden");
            document.getElementById("areaPrimoAccesso").classList.remove("hidden");
        } else { successoLogin(data); }
      } else { alert("Password errata!"); }
    } catch (e) { alert("Errore durante il login."); }
    mostraLoader(false);
  }

  async function faseCambioPassword() {
    const p1 = document.getElementById("newPassInput").value.trim();
    const p2 = document.getElementById("confirmPassInput").value.trim();
    if (p1.length < 4 || p1 !== p2) return alert("Password non valide!");
    mostraLoader(true);
    try {
      const resp = await fetch(`${SCRIPT_URL}?azione=cambiaPassword&telefono=${encodeURIComponent(identificativoUtente)}&nuovaPass=${encodeURIComponent(p1)}`);
      const data = await resp.json();
      if (data.aggiornato) { alert("Password aggiornata!"); location.reload(); }
    } catch (e) { alert("Errore salvataggio."); }
    mostraLoader(false);
  }
  
  async function faseResetRichiesta() {
  if (!confirm("Vuoi resettare la password?")) return;
  
  mostraLoader(true);
  try {
    const resp = await fetch(`${SCRIPT_URL}?azione=resetPassword&telefono=${encodeURIComponent(identificativoUtente)}`);
    const data = await resp.json();
    if (data.resetInviato) {
      alert("La password è stata resettata. Inserisci il tuo numero di cellulare per procedere.");
      location.reload(); 
    } else {
      alert("Errore durante il reset. Verifica i dati.");
    }
  } catch (e) {
    alert("Errore di connessione al server.");
  }
  mostraLoader(false);
}
  function successoLogin(data) {
    linkAppSheetDinamico = data.linkAppSheet || "";
    linkTePuDinamico = data.linkTePu || "";
    linkTerritoriDinamico = data.linkTerritori || "";

    document.getElementById("welcomeHeader").innerText = "Ciao " + identificativoUtente;
    document.getElementById("idHeader").innerText = data.email || "";

    if (linkAppSheetDinamico) document.getElementById("btnAppSheet").classList.remove("hidden");
    if (linkTePuDinamico) document.getElementById("btnAppSheetTePu").classList.remove("hidden");
    if (linkTerritoriDinamico) document.getElementById("btnTerritoriApp").classList.remove("hidden");
    
    // Gestione visibilità pulsanti TePu (Colonna I)
    if (data.mostraTePu) {
        document.getElementById("btnTepuView").classList.remove("hidden");
        document.getElementById("btnTepuSito").classList.remove("hidden");
        document.getElementById("btnTepuDispo").classList.remove("hidden");
        document.getElementById("btnTepuConf").classList.remove("hidden");
		document.getElementById("btnTepuRapp").classList.remove("hidden");
    }

    document.getElementById("step2").classList.add("hidden");
    document.getElementById("step3").classList.remove("hidden");
}

  function apriLink(scelta) {
    let url = ""; let titolo = "";
	if (scelta === 'TERRITORI_APP') { window.open(linkTerritoriDinamico, "_blank"); return; }
    if (scelta === 'APPSHEET') { window.open(linkAppSheetDinamico, "_blank"); return; }
    if (scelta === 'APPSHEET_TEPU') { window.open(linkTePuDinamico, "_blank"); return; }
    if (scelta === 'TEPU_SITO') { window.open("https://sites.google.com/view/tepu/home?authuser=0", "_blank"); return; }
    
    const links = {
        'INCARICHI': ["https://lookerstudio.google.com/embed/reporting/f152e697-95b9-440b-8f5e-773af928dd50/page/PEurF", "Incarichi"],
        'TEPU_VIEW': ["https://lookerstudio.google.com/embed/reporting/6b529a65-c908-42ef-b7ae-b47488150c39/page/exRtF", "Turni TePu"],
        'TEPU_DISPO': ["https://forms.gle/DkKF4wc4t5oQEGvh7", "Disponibilità"],
        'TEPU_CONF': ["https://forms.gle/14andBiw6spC4AXJA", "Conferma Turno"],
		'TEPU_RAPP': ["https://forms.gle/zWxshWRgiTeWnc596", "Rapporto Turno"],
        'TERRITORI_CONG': ["https://umap.openstreetmap.fr/it/map/firenze-soffino-totale_1199067", "Mappa"],
        'TERRITORI_LAV': ["https://script.google.com/macros/s/AKfycbwWitvaggUAgVdYE5mf0GKG6XbZ03qLcJ7muUUXemrlNqTwPxG5hOAXMx5hZBNuX8sd/exec?tabella=Assegnati", "Lavorazione"],
        'TERRITORI_NON_LAV': ["https://script.google.com/macros/s/AKfycbwWitvaggUAgVdYE5mf0GKG6XbZ03qLcJ7muUUXemrlNqTwPxG5hOAXMx5hZBNuX8sd/exec?tabella=NonAssegnati", "Disponibili"]
    };

    if (links[scelta]) {
        [url, titolo] = links[scelta];
        document.getElementById("mainCard").classList.add("hidden");
        document.getElementById("stepExternal").style.display = "flex";
        document.getElementById("externalFrame").src = url;
        document.getElementById("titoloPagina").innerText = titolo;
    }
  }

  function tornaAlMenu() { document.getElementById("stepExternal").style.display = "none"; document.getElementById("mainCard").classList.remove("hidden"); document.getElementById("externalFrame").src = ""; }
  function mostraLoader(s) { document.getElementById("loader").classList.toggle("hidden", !s); }
</script>
</body>
</html>
